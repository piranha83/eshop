  /sbp/v1.0/refund:
    post:
      tags:
        - СБП
        - '4. Сервис СБП: Работа с возвратами'
      summary: Start Refund
      description: Start Refund
      operationId: startRefund
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                Data:
                  type: object
                  properties:
                    accountCode:
                      type: string
                      example: '00000000000000000000'
                    amount:
                      type: number
                      example: 0.01
                    bankCode:
                      type: string
                      example: '000000000'
                    currency:
                      type: string
                      example: RUB
                    purpose:
                      type: string
                      example: Возврат невыясненных ндс
                    qrcId:
                      type: string
                      example: '{{qrcId}}'
                    refTransactionId:
                      type: string
                      example: trx-id-uuid
                    trxId:
                      type: string
                      example: trx-id
            examples:
              Start Refund:
                value:
                  Data:
                    accountCode: '00000000000000000000'
                    amount: 0.01
                    bankCode: '000000000'
                    currency: RUB
                    purpose: Возврат невыясненных ндс
                    qrcId: '{{qrcId}}'
                    refTransactionId: trx-id-uuid
                    trxId: trx-id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                    nullable: false
                  status:
                    type: string
                    nullable: false
                additionalProperties: false
      security:
        - bearerAuth: []
  /sbp/v1.0/refund/{refund_id}:
