  /sbp/v1.0/qr-code/merchant/{merchantId}/{accountId}:
    post:
      tags:
        - СБП
        - '3. Сервис СБП: Работа с QR-кодами'
      summary: Register Qr Code
      description: Register Qr Code
      operationId: registerQrCode
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                Data:
                  type: object
                  properties:
                    amount:
                      type: number
                      example: 1
                    currency:
                      type: string
                      example: RUB
                    customerCode:
                      type: string
                      example: '{{customerCode}}'
                    imageParams:
                      type: object
                      properties:
                        height:
                          type: number
                          example: 200
                        mediaType:
                          type: string
                          example: image/png
                        width:
                          type: number
                          example: 200
                    legalId:
                      type: string
                      example: '{{legalId}}'
                    merchantId:
                      type: string
                      example: '{{merchantId}}'
                    paymentPurpose:
                      type: string
                      example: Bill
                    qrcType:
                      type: string
                      example: '01'
                    sourceName:
                      type: string
                      example: string
                    redirectUrl:
                      type: string
                      example: string
                    ttl:
                      type: number
                      example: 1
            examples:
              Register Qr Code:
                value:
                  Data:
                    amount: 1
                    currency: RUB
                    customerCode: '{{customerCode}}'
                    imageParams:
                      height: 200
                      mediaType: image/png
                      width: 200
                    legalId: '{{legalId}}'
                    merchantId: '{{merchantId}}'
                    paymentPurpose: Bill
                    qrcType: '01'
                    sourceName: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  Data:
                    type: object
                    properties:
                      qrcId:
                        type: string
                        nullable: false
                      payload:
                        type: string
                        nullable: false
                    additionalProperties: false
                additionalProperties: false
      security:
        - bearerAuth: []
    parameters:
      - name: merchantId
        in: path
        required: true
        schema:
          type: string
      - name: accountId
        in: path
        required: true
        schema:
          type: string
  /sbp/v1.0/qr-code/{qrcId}:
    get:
