    parameters:
      - name: legalId
        in: path
        required: true
        schema:
          type: string
  /sbp/v1.0/merchant/legal-entity/{legalId}:
    get:
      tags:
        - СБП
        - '2. Сервис СБП: Работа с ТСП'
      summary: Get Merchants List
      description: Get Merchants List
      operationId: getMerchantsList
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
    post:
      tags:
        - СБП
        - '2. Сервис СБП: Работа с ТСП'
      summary: Register Merchant
      description: Register Merchant
      operationId: registerMerchant
      parameters:
        - name: ''
          in: header
          schema:
            type: string
            example: ''
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                Data:
                  type: object
                  properties:
                    address:
                      type: string
                      example: Адрес торговой точки
                    brandName:
                      type: string
                      example: Название торговой точки
                    capabilities:
                      type: string
                      example: '111'
                    city:
                      type: string
                      example: Город где находится торговая точка
                    contactPhoneNumber:
                      type: string
                      example: Контактный номер телефона
                    countryCode:
                      type: string
                      example: RU
                    countrySubDivisionCode:
                      type: string
                      example: Первые две цифры ОКТМО
                    customerCode:
                      type: string
                      example: '{{customerCode}}'
                    legalId:
                      type: string
                      example: '{{legalId}}'
                    mcc:
                      type: string
                      example: МСС-код
                    zipCode:
                      type: string
                      example: Индекс
            examples:
              Register Merchant:
                value:
                  Data:
                    address: Адрес торговой точки
                    brandName: Название торговой точки
                    capabilities: '111'
                    city: Город где находится торговая точка
                    contactPhoneNumber: Контактный номер телефона
                    countryCode: RU
                    countrySubDivisionCode: Первые две цифры ОКТМО
                    customerCode: '{{customerCode}}'
                    legalId: '{{legalId}}'
                    mcc: МСС-код
                    zipCode: Индекс
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
    parameters:
      - name: legalId
        in: path
        required: true
        schema:
          type: string
  /sbp/v1.0/merchant/{merchantId}:
    get:
      tags:
        - СБП
        - '2. Сервис СБП: Работа с ТСП'
      summary: Get Merchant
      description: Get Merchant
      operationId: getMerchant
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
