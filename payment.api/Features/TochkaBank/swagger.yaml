openapi: 3.0.3
info:
  title: OpenAPI
  description: Коллекция запросов для работы с OpenAPI Точки
  version: 1.0.0
  contact: {}
servers:
  - url: '{{RS_URL}}'
  - url: '{{AS_URL}}'
paths:
  /v1.0/consents:
    get:
      tags:
        - Разрешения
      summary: Проверка всех разрешений
      description: Проверка всех разрешений
      operationId: ''
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
    post:
      summary: 'Второй шаг: создание разрешения'
      description: >-
        С полученным токеном идем создавать разрешения.

        Из ответа берем id разреешения и заворачиваем это все в объект jwt.

        В данной коллекции полностью подготовленный запрос выдается в консоль
        для того что бы сразу можно было перейти и подтвердить разрешения
      operationId: '38'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                Data:
                  type: object
                  properties:
                    expirationDateTime:
                      type: string
                      example: '2030-10-03T00:00:00+00:00'
                    permissions:
                      type: array
                      items:
                        type: string
                        example: ReadAccountsBasic
                      example:
                        - ReadAccountsBasic
                        - ReadAccountsDetail
                        - ReadBalances
                        - ReadStatements
                        - ReadCustomerData
                        - ReadSBPData
                        - EditSBPData
                        - CreatePaymentForSign
                        - CreatePaymentOrder
                        - ReadAcquiringData
                        - MakeAcquiringOperation
                        - ManageWebhookData
                        - ManageInvoiceData
            examples:
              'Второй шаг: создание разрешения':
                value:
                  Data:
                    expirationDateTime: '2030-10-03T00:00:00+00:00'
                    permissions:
                      - ReadAccountsBasic
                      - ReadAccountsDetail
                      - ReadBalances
                      - ReadStatements
                      - ReadCustomerData
                      - ReadSBPData
                      - EditSBPData
                      - CreatePaymentForSign
                      - CreatePaymentOrder
                      - ReadAcquiringData
                      - MakeAcquiringOperation
                      - ManageWebhookData
                      - ManageInvoiceData
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
  /v1.0/consents/{consent_id}:
    get:
      tags:
        - Разрешения
      summary: Проверяем разрешение
      description: Запрос для проверки статуса разрешения
      operationId: '1'
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
    parameters:
      - name: consent_id
        in: path
        required: true
        schema:
          type: string
  /v1.0/consents/{consent_id}/child:
    get:
      tags:
        - Разрешения
      summary: Проверяем дочерние разрешения
      description: Запрос для проверки статуса разрешения
      operationId: '2'
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
    parameters:
      - name: consent_id
        in: path
        required: true
        schema:
          type: string
  /sbp/v1.0/register-sbp-legal-entity:
    post:
      tags:
        - СБП
        - '1. Сервис СБП: Работа с ЮЛ'
      summary: Register Legal Entity
      description: Register Legal Entity
      operationId: registerLegalEntity
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                Data:
                  type: object
                  properties:
                    bankCode:
                      type: string
                      example: '{{bankCode}}'
                    customerCode:
                      type: string
                      example: '{{customerCode}}'
            examples:
              Register Legal Entity:
                value:
                  Data:
                    bankCode: '{{bankCode}}'
                    customerCode: '{{customerCode}}'
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
  /sbp/v1.0/legal-entity/{legalId}:
    get:
      tags:
        - СБП
        - '1. Сервис СБП: Работа с ЮЛ'
      summary: Get Legal Entity
      description: Get Legal Entity
      operationId: getLegalEntity
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
    post:
      tags:
        - СБП
        - '1. Сервис СБП: Работа с ЮЛ'
      summary: Set legal entity status
      description: Set legal entity status
      operationId: setLegalEntityStatus
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                Data:
                  type: object
                  properties:
                    legalId:
                      type: string
                      example: '{{legalId}}'
                    status:
                      type: string
                      example: Active
            examples:
              Set legal entity status:
                value:
                  Data:
                    legalId: '{{legalId}}'
                    status: Active
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
    parameters:
      - name: legalId
        in: path
        required: true
        schema:
          type: string
  /sbp/v1.0/customer/{customerCode}/{bankCode}:
    get:
      tags:
        - СБП
        - '1. Сервис СБП: Работа с ЮЛ'
      summary: Get Customer Info
      description: Возвращает информацию о расчетном счете юр. лица.
      operationId: getCustomerInfo
      responses:
        '200':
          description: ''
      security:
        - bearerAuth: []
    parameters:
      - name: customerCode
        in: path
        required: true
        schema:
          type: string
      - name: bankCode
        in: path
        required: true
        schema:
          type: string
  /sbp/v1.0/account/{legalId}:
    get:
      tags:
        - СБП
        - '1. Сервис СБП: Работа с ЮЛ'
      summary: Get Accounts List
      description: Возвращает список счетов юр. лица.
      operationId: getAccountsList
      responses:
        '200':
          description: ''
      security:
