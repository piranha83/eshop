openapi: 3.0.1
info:
  title: SPAS API
  version: '2.0'
paths:
  /api/spas/v2.0/GetRegions:
    get:
      tags:
        - AddressInfo
      summary: Получить список регионов
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressesResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/GetAddressItems:
    post:
      tags:
        - AddressInfo
      summary: 'Получить список дочерних элементов, соответствующих заданным фильтрам'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilterObject'
          text/json:
            schema:
              $ref: '#/components/schemas/FilterObject'
          application/*+json:
            schema:
              $ref: '#/components/schemas/FilterObject'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressesResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/GetDetails:
    get:
      tags:
        - AddressInfo
      summary: Получить дополнительную информацию для заданного адресного элемента
      parameters:
        - name: object_id
          in: query
          description: Идентификатор адресного элемента
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressDetailsResult'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/IsDescendant:
    get:
      tags:
        - AddressInfo
      summary: 'Проверка, является ли элемент ancestor родительским элементом в иерархии для элемента descendant'
      parameters:
        - name: ancestor
          in: query
          description: Идентификатор родительского элемента
          schema:
            type: integer
            format: int64
        - name: descendant
          in: query
          description: Идентификатор дочернего элемента
          schema:
            type: integer
            format: int64
        - name: address_type
          in: query
          description: 'Вид представления адреса: 1 - административное деление 2 - муниципальное деление'
          schema:
            $ref: '#/components/schemas/AddressType'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/HasDescendants:
    get:
      tags:
        - AddressInfo
      summary: 'Проверка, имеет ли элемент parent дочерние элементы до уровня up_to_level'
      parameters:
        - name: parent
          in: query
          description: ''
          schema:
            type: integer
            format: int64
        - name: up_to_level
          in: query
          description: ''
          schema:
            type: integer
            format: int32
        - name: address_type
          in: query
          description: ''
          schema:
            $ref: '#/components/schemas/AddressType'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/GetAddressItemById:
    get:
      tags:
        - AddressInfo
      summary: Получение адресного элемента по идентификатору
      parameters:
        - name: object_id
          in: query
          description: ''
          schema:
            type: integer
            format: int64
        - name: address_type
          in: query
          description: ''
          schema:
            $ref: '#/components/schemas/AddressType'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressesResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/GetAddressItemByGuid:
    get:
      tags:
        - AddressInfo
      summary: Получение адресного элемента по уникальному идентификатору ФИАС
      parameters:
        - name: object_guid
          in: query
          description: ''
          schema:
            type: string
            format: uuid
        - name: address_type
          in: query
          description: ''
          schema:
            $ref: '#/components/schemas/AddressType'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressesResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/GetAddressItemByCadastralNumber:
    get:
      tags:
        - AddressInfo
      summary: Получение адресного элемента по кадастровому номеру
      parameters:
        - name: cadastral_number
          in: query
          description: ''
          schema:
            type: string
        - name: address_type
          in: query
          description: ''
          schema:
            $ref: '#/components/schemas/AddressType'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressesResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/GetFiasObjectTypes:
    get:
      tags:
        - AddressInfo
      summary: Получение типов объектов ФИАС
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FiasTypesResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/GetChanges:
    get:
      tags:
        - Changes
      summary: 'Поставить задачу на получение списка адресных объектов, изменённых в указанный интервал времени и отобранных по критериям'
      parameters:
        - name: startDate
          in: query
          description: Дата начала поиска изменений
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          description: Дата кокончания поиска изменений
          schema:
            type: string
            format: date-time
        - name: changeMask
          in: query
          description: Маска для отбора изменений
          schema:
            type: integer
            format: int32
        - name: regionCode
          in: query
          description: 'Код региона, для которого происходит поиск изменений'
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResult'
        '406':
          description: Not Acceptable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/GetSearchTaskStatus:
    get:
      tags:
        - Changes
      summary: Сервис для получения состояния задачи по поиску изменений
      parameters:
        - name: taskId
          in: query
          description: Номер задачи по поиску изменений
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IFetchChangesTaskStatus'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResult'
      security:
        - master-token: [ ]
  /api/spas/v2.0/GetSearchResultBlock:
    get:
      tags:
        - Changes
      summary: Сервис для получения типов объектов ФИАС
      parameters:
        - name: taskId
          in: query
          description: Номер задачи по поиску изменений
          schema:
            type: integer
            format: int64
        - name: blockIndex
          in: query
          description: Номер блока
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
