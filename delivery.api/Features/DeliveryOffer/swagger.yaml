openapi: 3.0.0
info:
  title: Yandex Delivery B2B Platform API (Test Environment)
  version: 1.0.0
  description: >-
    API for managing B2B delivery orders, including offer creation and order
    confirmation. https://yandex.ru/support/delivery-profile/ru/api/other-day/ref/
servers:
  - url: https://b2b.taxi.tst.yandex.net
paths:
  /api/b2b/platform/pricing-calculator:
    post:
      summary: 1. Расчёт стоимости доставки
      responses:
        '200':
          description: 1. Расчёт стоимости доставки 200
          headers:
            Content-Length:
              schema:
                type: integer
              example: '48'
            Accept-Encoding:
              schema:
                type: string
              example: gzip, zstd, identity
          content:
            application/json:
              schema:
                type: object
                properties:
                  pricing_total:
                    type: string
                  delivery_days:
                    type: integer
              example:
                pricing_total: 456.21 RUB
                delivery_days: 5
      tags:
        - Подготовка заявки
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                client_price:
                  type: integer
                destination:
                  type: object
                  properties:
                    address:
                      type: string
                payment_method:
                  type: string
                source:
                  type: object
                  properties:
                    platform_station_id:
                      type: string
                tariff:
                  type: string
                total_assessed_price:
                  type: integer
                total_weight:
                  type: integer
            example:
              client_price: 0
              destination:
                address: Москва, ул. Льва Толстого, 16
              payment_method: already_paid
              source:
                platform_station_id: e1139f6d-e34f-47a9-a55f-31f032a861a6
              tariff: time_interval
              total_assessed_price: 1699000
              total_weight: 2280
  /api/b2b/platform/offers/info:
    get:
      summary: 2. Получение интервалов доставки
      parameters:
        - name: station_id
          in: query
          description: Ваш platform_station_id
          schema:
            type: string
          example: e1139f6d-e34f-47a9-a55f-31f032a861a6
        - name: full_address
          in: query
          description: Заполняем в случае доставки до двери
          schema:
            type: string
          example: Москва, ул. Льва Толстого, 16
        - name: self_pickup_id
          in: query
          description: Заполняем в случае доставки до ПВЗ
          schema:
            type: string
          example: 001db195-530b-43fc-8c17-793bf7d77et3
        - name: send_unix
          in: query
          description: |
            Просит вернуть время в UNIX
          schema:
            type: boolean
          example: 'true'
      responses:
        '200':
          description: 2. Получение интервалов доставки 200
          headers:
            Accept-Encoding:
              schema:
                type: string
              example: gzip, zstd, identity
            Content-Length:
              schema:
                type: integer
              example: '826'
          content:
            application/json:
              schema:
                type: object
                properties:
                  offers:
                    type: array
                    items:
                      type: object
                      properties:
                        from:
                          type: string
                          format: date-time
                        to:
                          type: string
                          format: date-time
              example:
                offers:
                  - from: '2026-04-09T07:00:00.000000Z'
                    to: '2026-04-09T16:00:00.000000Z'
                  - from: '2026-04-10T07:00:00.000000Z'
                    to: '2026-04-10T16:00:00.000000Z'
                  - from: '2026-04-11T07:00:00.000000Z'
                    to: '2026-04-11T16:00:00.000000Z'
                  - from: '2026-04-12T07:00:00.000000Z'
                    to: '2026-04-12T16:00:00.000000Z'
                  - from: '2026-04-13T07:00:00.000000Z'
                    to: '2026-04-13T16:00:00.000000Z'
                  - from: '2026-04-14T07:00:00.000000Z'
                    to: '2026-04-14T16:00:00.000000Z'
                  - from: '2026-04-15T07:00:00.000000Z'
                    to: '2026-04-15T16:00:00.000000Z'
                  - from: '2026-04-16T07:00:00.000000Z'
                    to: '2026-04-16T16:00:00.000000Z'
                  - from: '2026-04-17T07:00:00.000000Z'
                    to: '2026-04-17T16:00:00.000000Z'
                  - from: '2026-04-18T07:00:00.000000Z'
                    to: '2026-04-18T16:00:00.000000Z'
                  - from: '2026-04-19T07:00:00.000000Z'
                    to: '2026-04-19T16:00:00.000000Z'
      tags:
        - Подготовка заявки
  /api/b2b/platform/offers/create:
    post:
      summary: 1. Создание заявки
      responses:
        '200':
          description: 1. Создание заявки 200
          headers:
            Accept-Encoding:
              schema:
                type: string
              example: gzip, zstd, identity
            Content-Length:
              schema:
                type: integer
              example: '444'
          content:
            application/json:
              schema:
                type: object
                properties:
                  offers:
                    type: array
                    items:
                      type: object
                      properties:
                        offer_id:
                          type: string
                        expires_at:
                          type: string
                          format: date-time
                        offer_details:
                          type: object
                          properties:
                            delivery_interval:
                              type: object
                              properties:
                                min:
                                  type: string
                                  format: date-time
                                max:
                                  type: string
                                  format: date-time
                                policy:
                                  type: string
                            pickup_interval:
                              type: object
                              properties:
                                min:
                                  type: string
                                  format: date-time
                                max:
                                  type: string
                                  format: date-time
                            pricing:
                              type: string
                            pricing_total:
                              type: string
                            features:
                              type: object
                        station_id:
                          type: string
              example:
                offers:
                  - offer_id: 8142343c967949499cd43811c6112811
                    expires_at: '2026-04-04T21:49:04.000000Z'
                    offer_details:
                      delivery_interval:
                        min: '2026-04-08T07:00:00.000000Z'
                        max: '2026-04-08T09:00:00.000000Z'
                        policy: self_pickup
                      pickup_interval:
                        min: '2026-04-04T21:34:04.000000Z'
                        max: '2026-04-06T11:00:00.000000Z'
                      pricing: 285.41 RUB
                      pricing_total: 285.41 RUB
                      features: {}
                    station_id: 01946f4f013c7337874ec2fb848a58a4
      tags:
        - Основные запросы
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                info:
                  type: object
                  properties:
                    operator_request_id:
                      type: string
                    comment:
                      type: string
                last_mile_policy:
                  type: string
                source:
                  type: object
                  properties:
                    platform_station:
                      type: object
                      properties:
                        platform_id:
                          type: string
                destination:
                  type: object
                  properties:
                    type:
                      type: string
                    platform_station:
                      type: object
                      properties:
                        platform_id:
                          type: string
                    interval_utc:
                      type: object
                      properties:
                        from:
                          type: string
                          format: date-time
                        to:
                          type: string
                          format: date-time
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      count:
                        type: integer
                      name:
                        type: string
                      article:
                        type: string
                      barcode:
                        type: string
                      billing_details:
                        type: object
                        properties:
                          unit_price:
                            type: integer
                          assessed_unit_price:
                            type: integer
                      physical_dims:
                        type: object
                        properties:
                          predefined_volume:
                            type: integer
                          weight_gross:
                            type: number
                            format: decimal
                      place_barcode:
                        type: string
                places:
                  type: array
                  items:
                    type: object
                    properties:
                      physical_dims:
                        type: object
                        properties:
                          predefined_volume:
                            type: integer
                      description:
                        type: string
                      barcode:
                        type: string
                billing_info:
                  type: object
                  properties:
                    payment_method:
                      type: string
                recipient_info:
                  type: object
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    phone:
                      type: string
            example:
              info:
                operator_request_id: '#номерзаказа-002'
                comment: В коробке Алиса — будьте осторожны при перевозке!
              last_mile_policy: time_interval
              source:
                platform_station:
                  platform_id: e1139f6d-e34f-47a9-a55f-31f032a861a6
              destination:
                type: platform_station
                platform_station:
                  platform_id: 01946f4f013c7337874ec2fb848a58a4
                interval_utc:
                  from: '2026-04-04T08:00:00.000000Z'
                  to: '2026-04-08T12:00:00.000000Z'
              items:
                - count: 1
                  name: Яндекс Станция 2
                  article: YS2-2022
                  barcode: '111222333'
                  billing_details:
                    unit_price: 1699000
                    assessed_unit_price: 1699000
                  physical_dims:
                    predefined_volume: 2280
                    weight_gross: 1500
                  place_barcode: ordernumber-A
              places:
                - physical_dims:
                    predefined_volume: 2280
                  description: >-
                    Чёрная коробка с логотипом Яндекса, внутри новая крутая
