              schema:
                type: object
                properties:
                  request_id:
                    type: string
              example:
                request_id: 3c1bd0c478f448339ebc1ca89a970be8-udp
      tags:
        - Основные запросы
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                offer_id:
                  type: string
            example:
              offer_id: 8142343c967949499cd43811c6112811
