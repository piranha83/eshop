services:
  - type: web
    name: catalog
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: ./catalog.api/render
    envVars:
    - key: PORT
      value: 7259
    - key: ASPNETCORE_ENVIRONMENT
      value: Docker
    - key: DB_URL
      fromDatabase:
        name: postgres
        property: connectionString

databases:
  - name: postgres
    plan: free
    postgresMajorVersion: 16