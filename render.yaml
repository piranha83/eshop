services:
  - type: web
    name: catalog
    plan: free
    env: docker
    dockerContext: .
    dockerfilePath: ./catalog.api/Dockerfile
    ports:
      - port: 80
        http: true
    envVars:
      - key: 
        value: http://+:80
      - key: ASPNETCORE_URLS
        value: http://+:80
      # ASP.NET Core will still redirect HTTP to HTTPS at the app level if configured
      # Render handles the SSL certificate automatically at the edge
      - key: ASPNETCORE_ENVIRONMENT
        value: Docker
      - key: DB_URL
        fromDatabase:
          name: postgres
          property: connectionString

databases:
  - name: postgres
    plan: free
    postgresMajorVersion: 16