version: "1"
services:
  - type: web
    name: catalog
    runtime: docker
    repo: https://github.com/piranha83/eshop
    branch: render
    plan: free
    envVars:
      - key: ConnectionStrings__Default
        sync: false
      - key: render
        value: true
      - key: CatalogApi__Url
        fromService:
          name: catalog
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: IdentityApi__Url
        fromService:
          name: identity
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: Frontend__Url
        fromService:
          name: frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DB_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: secrets-path
        sync: false
    region: oregon
    dockerContext: .
    dockerfilePath: ./catalog.api/Dockerfile
    autoDeployTrigger: off

  - type: web
    name: identity
    runtime: docker
    repo: https://github.com/piranha83/eshop
    branch: render
    plan: free
    envVars:
      - key: ConnectionStrings__Default
        sync: false
      - key: render
        value: true
      - key: CatalogApi__Url
        fromService:
          name: catalog
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: IdentityApi__Url
        fromService:
          name: identity
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: Frontend__Url
        fromService:
          name: frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DB_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: secrets-path
        sync: false
    region: oregon
    dockerContext: .
    dockerfilePath: ./identity.api/Dockerfile
    autoDeployTrigger: off

  - type: web
    name: payment
    runtime: docker
    repo: https://github.com/piranha83/eshop
    branch: render
    plan: free
    envVars:
      - key: ConnectionStrings__Default
        sync: false
      - key: render
        value: true
      - key: CatalogApi__Url
        fromService:
          name: catalog
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: IdentityApi__Url
        fromService:
          name: identity
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: Frontend__Url
        fromService:
          name: frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DB_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: secrets-path
        sync: false
      - key: Rabbit__Host
        fromService:
          name: rabbitmq
          property: host
      - key: Rabbit__User
        fromService:
          name: rabbitmq
          property: RABBITMQ_DEFAULT_USER
      - key: Rabbit__Password
        fromService:
          name: rabbitmq
          property: RABBITMQ_DEFAULT_PASS
      - key: Rabbit__Vhost
        value: /order
    region: oregon
    dockerContext: .
    dockerfilePath: ./payment.api/Dockerfile
    autoDeployTrigger: off

  - type: web
    name: frontend
    runtime: docker
    repo: https://github.com/piranha83/eshop
    branch: render
    plan: free
    region: oregon
    dockerContext: ./eshop
    dockerfilePath: ./eshop/Dockerfile
    autoDeployTrigger: off

  - type: web
    name: rabbitmq
    env: docker
    plan: free
    envVars:
      - key: RABBITMQ_ERLANG_COOKIE
        generateValue: true
      - key: RABBITMQ_DEFAULT_USER
        value: rabbitmq
      - key: RABBITMQ_DEFAULT_PASS
        generateValue: true
    disk:
      name: rabbitmq
      mountPath: /var/lib/rabbitmq
      sizeGB: 10

databases:
  - name: postgres
    plan: free
    postgresMajorVersion: 16